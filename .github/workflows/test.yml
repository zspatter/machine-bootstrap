name: Test bootstrap scripts

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly drift check, independent of any commit landing here: catches
    # breakage from things this repo doesn't control -- a new Python or uv
    # release, runner image updates, astral.sh installer changes,
    # winget/apt/pacman package changes, etc. Monday mornings UTC, off the
    # exact hour per GitHub's own guidance to avoid scheduling congestion.
    - cron: '17 6 * * 1'

jobs:
  uv-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-git.sh
        run: ./setup-git.sh

      - name: Run setup-uv.sh
        run: ./setup-uv.sh

      - name: Verify uv + Python + git
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv --version
          uv python list --only-installed
          uv run python --version
          git --version

      - name: Re-run setup-uv.sh (idempotency -- "safe to re-run" is a documented claim)
        run: ./setup-uv.sh

  uv-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-git.ps1
        shell: pwsh
        run: .\setup-git.ps1

      - name: Run setup-uv.ps1
        shell: pwsh
        run: .\setup-uv.ps1

      - name: Verify uv + Python + git
        shell: pwsh
        run: |
          $env:Path = "$HOME\.local\bin;$env:Path"
          uv --version
          uv python list --only-installed
          uv run python --version
          git --version

      - name: Re-run setup-uv.ps1 (idempotency)
        shell: pwsh
        run: .\setup-uv.ps1

  # Distros beyond Ubuntu, in containers on the ubuntu-latest host.
  # debian/kali are apt-based; archlinux stands in for CachyOS (same
  # package manager, no reliably maintained official CachyOS image). git is
  # pre-installed here for actions/checkout's own sake -- the uv-no-tools
  # job below covers the genuinely-bare-machine path.
  uv-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:12'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates'
          - image: 'debian:11'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates'
          - image: 'kalilinux/kali-rolling'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git curl ca-certificates'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v4

      - name: Run setup-uv.sh
        run: ./setup-uv.sh

      - name: Verify uv + Python
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv --version
          uv run python --version

  # Genuinely bare machine: no git anywhere, repo fetched via plain
  # tarball. Proves setup-git.sh actually provides git (rather than
  # actions/checkout's prereq masking it) and that setup-uv.sh needs
  # nothing beyond curl.
  uv-no-tools:
    runs-on: ubuntu-latest
    container:
      image: 'debian:12'
    steps:
      - name: Install only curl/tar/ca-certificates (no git)
        run: apt-get update && apt-get install -y curl ca-certificates tar

      - name: Fetch repo without git
        run: |
          mkdir repo
          curl -fsSL "https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz" \
            | tar xz -C repo --strip-components=1

      - name: Confirm git is genuinely absent before running the scripts
        run: |
          if command -v git >/dev/null 2>&1; then
            echo "::error::git already present -- this job no longer tests what it's supposed to"
            exit 1
          fi
          echo "OK: git is not installed, as expected"

      - name: Run setup-git.sh
        working-directory: repo
        run: ./setup-git.sh

      - name: Run setup-uv.sh
        working-directory: repo
        run: ./setup-uv.sh

      - name: Verify git + uv + Python
        working-directory: repo
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          git --version
          uv --version
          uv run python --version

  # The tool add-ons (cli-tools bundle, nvim, oh-my-posh, obsidian) are
  # all quick installs -- one consolidated job per platform rather than a
  # job per tool keeps the matrix sane. Obsidian on the native jobs proves
  # the install; nobody launches a GUI in CI.
  tools-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-cli-tools.sh
        run: ./setup-cli-tools.sh

      - name: Run setup-nvim.sh
        run: ./setup-nvim.sh

      - name: Run setup-oh-my-posh.sh
        run: ./setup-oh-my-posh.sh

      - name: Run setup-obsidian.sh
        run: ./setup-obsidian.sh

      - name: Run setup-vscode.sh
        run: ./setup-vscode.sh

      - name: Run setup-zen-browser.sh
        run: ./setup-zen-browser.sh

      - name: Run setup-librewolf.sh
        run: ./setup-librewolf.sh

      - name: Run setup-claude-desktop.sh
        run: ./setup-claude-desktop.sh

      - name: Run setup-claude-code.sh
        run: ./setup-claude-code.sh

      - name: Verify everything
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for cmd in jq rg fd fzf bat zoxide nvim oh-my-posh claude; do
            command -v "$cmd"
            "$cmd" --version 2>&1 | head -n1
          done
          code --version | head -n1
          if [ "$(uname -s)" = "Darwin" ]; then
            test -d /Applications/Obsidian.app && echo "Obsidian.app present"
            test -d /Applications/Zen.app && echo "Zen.app present"
            test -d /Applications/LibreWolf.app && echo "LibreWolf.app present"
            test -d /Applications/Claude.app && echo "Claude.app present"
          else
            command -v obsidian && echo "obsidian binary present"
            command -v zen && echo "zen binary present"
            command -v librewolf && echo "librewolf binary present"
            command -v claude-desktop && echo "claude-desktop binary present"
          fi

  tools-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-cli-tools.ps1
        shell: pwsh
        run: .\setup-cli-tools.ps1

      - name: Run setup-nvim.ps1
        shell: pwsh
        run: .\setup-nvim.ps1

      - name: Run setup-oh-my-posh.ps1
        shell: pwsh
        run: .\setup-oh-my-posh.ps1

      - name: Run setup-obsidian.ps1
        shell: pwsh
        run: .\setup-obsidian.ps1

      - name: Run setup-vscode.ps1
        shell: pwsh
        run: .\setup-vscode.ps1

      - name: Run setup-zen-browser.ps1
        shell: pwsh
        run: .\setup-zen-browser.ps1

      - name: Run setup-librewolf.ps1
        shell: pwsh
        run: .\setup-librewolf.ps1

      - name: Run setup-claude-desktop.ps1
        shell: pwsh
        run: .\setup-claude-desktop.ps1

      - name: Run setup-claude-code.ps1
        shell: pwsh
        run: .\setup-claude-code.ps1

      - name: Verify everything
        shell: pwsh
        run: |
          $machine = [Environment]::GetEnvironmentVariable('Path', 'Machine')
          $user = [Environment]::GetEnvironmentVariable('Path', 'User')
          $env:Path = @($machine, $user) -join ';'
          $env:Path = "$HOME\.local\bin;$env:Path"
          $failed = @()
          foreach ($cmd in @('jq', 'rg', 'fd', 'fzf', 'bat', 'zoxide', 'nvim', 'oh-my-posh', 'code', 'claude')) {
            if (Get-Command $cmd -ErrorAction SilentlyContinue) {
              "${cmd}: $((& $cmd --version 2>&1 | Select-Object -First 1))"
            } else {
              "${cmd}: MISSING"
              $failed += $cmd
            }
          }
          foreach ($app in @(
            @{ name = 'obsidian'; id = 'Obsidian.Obsidian' },
            @{ name = 'zen'; id = 'Zen-Team.Zen-Browser' },
            @{ name = 'librewolf'; id = 'LibreWolf.LibreWolf' },
            @{ name = 'claude-desktop'; id = 'Anthropic.Claude' }
          )) {
            winget list --id $app.id -e --accept-source-agreements | Out-Null
            if ($LASTEXITCODE -ne 0) { $failed += $app.name } else { "$($app.name): registered with winget" }
          }
          if ($failed.Count -gt 0) { throw "missing: $($failed -join ', ')" }

  tools-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:12'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates tar'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git curl ca-certificates tar'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v4

      - name: Run setup-cli-tools.sh
        run: ./setup-cli-tools.sh

      - name: Run setup-nvim.sh
        run: ./setup-nvim.sh

      - name: Run setup-oh-my-posh.sh
        run: ./setup-oh-my-posh.sh

      - name: Run setup-obsidian.sh
        run: ./setup-obsidian.sh

      - name: Run setup-vscode.sh
        run: ./setup-vscode.sh

      - name: Run setup-zen-browser.sh
        run: ./setup-zen-browser.sh

      - name: Run setup-librewolf.sh
        run: ./setup-librewolf.sh

      - name: Run setup-claude-desktop.sh
        run: ./setup-claude-desktop.sh

      - name: Run setup-claude-code.sh
        run: ./setup-claude-code.sh

      - name: Verify everything
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for cmd in jq rg fd fzf bat zoxide nvim oh-my-posh claude; do
            command -v "$cmd"
            "$cmd" --version 2>&1 | head -n1
          done
          command -v obsidian && echo "obsidian binary present"
          command -v code && echo "code binary present"
          command -v zen && echo "zen binary present"
          # librewolf: extrepo path on debian only; claude-desktop:
          # debian-family only -- both self-skip on arch, so only assert
          # them where they're expected.
          if command -v apt-get >/dev/null 2>&1; then
            command -v librewolf && echo "librewolf binary present"
            command -v claude-desktop && echo "claude-desktop binary present"
          fi

  gh-cli-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-gh-cli.sh
        run: ./setup-gh-cli.sh

      - name: Verify gh
        run: gh --version

  gh-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-gh-cli.ps1
        shell: pwsh
        run: .\setup-gh-cli.ps1

      - name: Verify gh
        shell: pwsh
        run: gh --version

  # setup-gh-cli.sh's apt path adds GitHub's own apt repo with a
  # GPG-verified keyring (gh isn't in Debian/Ubuntu's default repos) --
  # proven on a fresh container rather than trusted from GitHub's docs.
  # archlinux covers the pacman path.
  gh-cli-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:12'
            prereq: 'apt-get update && apt-get install -y git ca-certificates'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git ca-certificates'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v4

      - name: Run setup-gh-cli.sh
        run: ./setup-gh-cli.sh

      - name: Verify gh
        run: gh --version
