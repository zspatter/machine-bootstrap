name: Test bootstrap scripts

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly drift check, independent of any commit landing here: catches
    # breakage from things this repo doesn't control -- a new Python
    # release, ubuntu-latest/macos-latest/archlinux:latest image updates,
    # python.org changing its listing format, winget/brew package changes,
    # etc. Monday mornings UTC, off the exact hour per GitHub's own
    # guidance to avoid scheduling congestion at popular times.
    - cron: '17 6 * * 1'

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        scope: [User, System]
    steps:
      - uses: actions/checkout@v4

      - name: Show elevation state
        shell: pwsh
        run: |
          $identity = [Security.Principal.WindowsIdentity]::GetCurrent()
          $principal = [Security.Principal.WindowsPrincipal]$identity
          $isAdmin = $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)
          "IsAdmin: $isAdmin"

      - name: Run setup-python-env.ps1 (-Scope ${{ matrix.scope }})
        shell: pwsh
        run: .\setup-python-env.ps1 -Scope ${{ matrix.scope }}

      - name: Verify pyenv-win + Python
        shell: pwsh
        run: |
          $pyenvBat = if ('${{ matrix.scope }}' -eq 'System') {
            'C:\ProgramData\pyenv\pyenv-win\bin\pyenv.bat'
          } else {
            "$HOME\.pyenv\pyenv-win\bin\pyenv.bat"
          }
          & $pyenvBat version
          & $pyenvBat exec python --version

  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        scope: [user, system]
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-python-env.sh (--${{ matrix.scope }})
        run: |
          if [ "${{ matrix.scope }}" = "system" ]; then
            sudo ./setup-python-env.sh --system
          else
            ./setup-python-env.sh --user
          fi

      - name: Verify pyenv + Python + direnv
        run: |
          if [ "${{ matrix.scope }}" = "system" ]; then
            export PYENV_ROOT=/opt/pyenv
          else
            export PYENV_ROOT="$HOME/.pyenv"
          fi
          export PATH="$PYENV_ROOT/bin:$PATH"
          if [ "${{ matrix.scope }}" = "system" ]; then
            eval "$(pyenv init - --no-rehash)"
          else
            eval "$(pyenv init -)"
          fi
          pyenv version
          python --version
          direnv --version

          # This step runs as the normal (non-root) runner user. Under
          # --system, that's exactly the "everyday account" the lockdown is
          # meant to stop -- assert it actually can't write here, since a
          # purely-additive chmod/icacls can silently fail to strip a
          # pre-existing write bit (caught for real once already).
          if [ "${{ matrix.scope }}" = "system" ]; then
            if touch "$PYENV_ROOT/shims/.write-test" 2>/dev/null; then
              echo "::error::non-root step could write to \$PYENV_ROOT/shims -- permission lockdown failed"
              exit 1
            fi
            echo "OK: shared root correctly not writable by this non-root step"
          fi

  linux-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        scope: [user, system]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Run setup-python-env.sh (--${{ matrix.scope }})
        run: |
          if [ "${{ matrix.scope }}" = "system" ]; then
            sudo ./setup-python-env.sh --system
          else
            ./setup-python-env.sh --user
          fi

      - name: Verify pyenv + Python + direnv
        run: |
          if [ "${{ matrix.scope }}" = "system" ]; then
            export PYENV_ROOT=/opt/pyenv
          else
            export PYENV_ROOT="$HOME/.pyenv"
          fi
          export PATH="$PYENV_ROOT/bin:$PATH"
          if [ "${{ matrix.scope }}" = "system" ]; then
            eval "$(pyenv init - --no-rehash)"
          else
            eval "$(pyenv init -)"
          fi
          pyenv version
          python --version
          direnv --version

          # See the matching check in the macos job: assert the non-root
          # runner user genuinely can't write to the shared root under
          # --system, rather than assuming a chmod/icacls grant worked.
          if [ "${{ matrix.scope }}" = "system" ]; then
            if touch "$PYENV_ROOT/shims/.write-test" 2>/dev/null; then
              echo "::error::non-root step could write to \$PYENV_ROOT/shims -- permission lockdown failed"
              exit 1
            fi
            echo "OK: shared root correctly not writable by this non-root step"
          fi

  # A few distros beyond Ubuntu, run in containers on top of the
  # ubuntu-latest host. Always root here, so this exercises --system scope
  # and, on one image, the actual claim that matters for it: a user account
  # created *after* the script runs inherits pyenv with no extra setup.
  # debian/kali are apt-based like the native jobs; archlinux exercises the
  # pacman branch (stands in for CachyOS, which doesn't have a reliably
  # maintained official container image -- same package manager and mostly
  # overlapping package set, so this is representative).
  linux-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:12'
            prereq: 'apt-get update && apt-get install -y git ca-certificates'
          - image: 'debian:11'
            prereq: 'apt-get update && apt-get install -y git ca-certificates'
          - image: 'kalilinux/kali-rolling'
            prereq: 'apt-get update && apt-get install -y git ca-certificates'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git ca-certificates'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v4

      - name: Run setup-python-env.sh (already root -> --system)
        run: ./setup-python-env.sh

      - name: Verify pyenv + Python + direnv
        run: |
          export PYENV_ROOT=/opt/pyenv
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init -)"
          pyenv version
          python --version
          direnv --version

      - name: Verify a new user account inherits it automatically
        run: |
          useradd -m -s /bin/bash ciuser
          su - ciuser -c 'command -v pyenv && pyenv version && python --version && direnv --version'

      - name: Verify that new user cannot write to the shared root
        run: |
          if su - ciuser -c 'touch /opt/pyenv/shims/.write-test' 2>/dev/null; then
            echo "::error::ciuser could write to /opt/pyenv/shims -- permission lockdown failed"
            exit 1
          fi
          echo "OK: shared root correctly not writable by a non-root account"

  # Every other Linux job pre-installs git for actions/checkout, which
  # incidentally also satisfies ensure_pyenv's own `git clone` -- meaning
  # none of them actually prove the script can provide git for itself.
  # This job deliberately does not install git, fetches the repo via a
  # plain tarball instead, and asserts git is genuinely absent before
  # running the script, so install_build_deps_apt's own `git` package is
  # what's actually being tested here.
  linux-no-git:
    runs-on: ubuntu-latest
    container:
      image: 'debian:12'
    steps:
      - name: Install only curl/tar/ca-certificates (no git)
        run: apt-get update && apt-get install -y curl ca-certificates tar

      - name: Fetch repo without git
        run: |
          mkdir repo
          curl -fsSL "https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz" \
            | tar xz -C repo --strip-components=1

      - name: Confirm git is genuinely absent before running the script
        run: |
          if command -v git >/dev/null 2>&1; then
            echo "::error::git already present -- this job no longer tests what it's supposed to"
            exit 1
          fi
          echo "OK: git is not installed, as expected"

      - name: Run setup-python-env.sh (already root -> --system)
        working-directory: repo
        run: ./setup-python-env.sh

      - name: Verify pyenv + Python + direnv + git
        working-directory: repo
        run: |
          export PYENV_ROOT=/opt/pyenv
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init - --no-rehash)"
          pyenv version
          python --version
          direnv --version
          git --version
