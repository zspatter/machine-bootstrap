name: Test bootstrap scripts

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly drift check, independent of any commit landing here: catches
    # breakage from things this repo doesn't control -- a new Python or uv
    # release, runner image updates, astral.sh installer changes,
    # winget/apt/pacman package changes, etc. Monday mornings UTC, off the
    # exact hour per GitHub's own guidance to avoid scheduling congestion.
    - cron: '17 6 * * 1'

# a superseded run is cancelled by the next push to the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uv-unix:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest rolls with GitHub (24.04 today, 26.04 when they
        # flip it); ubuntu-22.04 is the deliberate old-glibc/old-apt
        # floor -- GitHub has no rolling previous-LTS label, so the floor
        # is a pin by necessity. Bump it when GitHub retires the label
        # (the weekly cron failing on a removed label IS the reminder).
        os: [ubuntu-latest, ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Run setup-git.sh
        run: ./shell/setup-git.sh

      - name: Run setup-uv.sh
        run: ./shell/setup-uv.sh

      - name: Verify uv + Python + git
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv --version
          uv python list --only-installed
          uv run python --version
          git --version

      - name: Re-run setup-uv.sh (idempotency -- "safe to re-run" is a documented claim)
        run: ./shell/setup-uv.sh

  uv-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run setup-git.ps1
        shell: pwsh
        run: .\powershell\setup-git.ps1

      - name: Run setup-uv.ps1
        shell: pwsh
        run: .\powershell\setup-uv.ps1

      - name: Verify uv + Python + git
        shell: pwsh
        run: |
          $env:Path = "$HOME\.local\bin;$env:Path"
          uv --version
          uv python list --only-installed
          uv run python --version
          git --version

      - name: Re-run setup-uv.ps1 (idempotency)
        shell: pwsh
        run: .\powershell\setup-uv.ps1

  # Distros beyond Ubuntu, in containers on the ubuntu-latest host.
  # debian/kali are apt-based; archlinux stands in for CachyOS (same
  # package manager, no reliably maintained official CachyOS image). git is
  # pre-installed here for actions/checkout's own sake -- the uv-no-tools
  # job below covers the genuinely-bare-machine path. Debian rides the
  # rolling stable/oldstable aliases so releases roll through on their
  # own -- the pinned 11/12 had silently aged into oldstable/oldoldstable,
  # leaving current stable untested.
  uv-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:stable'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates'
          - image: 'debian:oldstable'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates'
          - image: 'kalilinux/kali-rolling'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git curl ca-certificates'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v7

      - name: Run setup-uv.sh
        run: ./shell/setup-uv.sh

      - name: Verify uv + Python
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv --version
          uv run python --version

  # Genuinely bare machine: no git anywhere, repo fetched via plain
  # tarball. Proves setup-git.sh actually provides git (rather than
  # actions/checkout's prereq masking it) and that setup-uv.sh needs
  # nothing beyond curl.
  uv-no-tools:
    runs-on: ubuntu-latest
    container:
      image: 'debian:stable'
    steps:
      - name: Install only curl/tar/ca-certificates (no git)
        run: apt-get update && apt-get install -y curl ca-certificates tar

      - name: Fetch repo without git
        run: |
          mkdir repo
          curl -fsSL "https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz" \
            | tar xz -C repo --strip-components=1

      - name: Confirm git is genuinely absent before running the scripts
        run: |
          if command -v git >/dev/null 2>&1; then
            echo "::error::git already present -- this job no longer tests what it's supposed to"
            exit 1
          fi
          echo "OK: git is not installed, as expected"

      - name: Run setup-git.sh
        working-directory: repo
        run: ./shell/setup-git.sh

      - name: Run setup-uv.sh
        working-directory: repo
        run: ./shell/setup-uv.sh

      - name: Verify git + uv + Python
        working-directory: repo
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          git --version
          uv --version
          uv run python --version

  # The tool add-ons are all quick installs -- one consolidated job per
  # platform rather than a job per tool keeps the matrix sane. GUI apps
  # are installed but never launched (no display in CI). The trailing
  # install-all step exercises the orchestrator's happy path cheaply:
  # every underlying script skips as already-installed.
  tools-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Run setup-uv.sh (foundation -- nvim tooling's ruff install rides uv)
        run: ./shell/setup-uv.sh

      - name: Run setup-cli-tools.sh
        run: ./shell/setup-cli-tools.sh

      - name: Run setup-nvim.sh
        run: ./shell/setup-nvim.sh

      - name: Run setup-nvim-tooling.sh
        run: ./shell/setup-nvim-tooling.sh

      - name: Run setup-oh-my-posh.sh
        run: ./shell/setup-oh-my-posh.sh

      - name: Run setup-fonts.sh
        run: ./shell/setup-fonts.sh

      - name: Run setup-neovide.sh
        run: ./shell/setup-neovide.sh

      - name: Run setup-vimr.sh (installs on macOS, self-skips elsewhere)
        run: ./shell/setup-vimr.sh

      - name: Run setup-ssh-github.sh
        run: ./shell/setup-ssh-github.sh

      - name: Run setup-obsidian.sh
        run: ./shell/setup-obsidian.sh

      - name: Run setup-vscode.sh
        run: ./shell/setup-vscode.sh

      - name: Run setup-zed.sh
        run: ./shell/setup-zed.sh

      - name: Run setup-zen-browser.sh
        run: ./shell/setup-zen-browser.sh

      - name: Run setup-librewolf.sh
        run: ./shell/setup-librewolf.sh

      - name: Run setup-claude-desktop.sh
        run: ./shell/setup-claude-desktop.sh

      - name: Run setup-claude-code.sh
        run: ./shell/setup-claude-code.sh

      - name: Verify everything
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for cmd in jq rg fd fzf bat zoxide nvim oh-my-posh claude; do
            command -v "$cmd"
            "$cmd" --version 2>&1 | head -n1
          done
          code --version | head -n1
          if [ "$(uname -s)" = "Darwin" ]; then
            test -d /Applications/VimR.app && echo "VimR.app present"
            test -d /Applications/Obsidian.app && echo "Obsidian.app present"
            test -d /Applications/Zen.app && echo "Zen.app present"
            test -d /Applications/LibreWolf.app && echo "LibreWolf.app present"
            test -d /Applications/Claude.app && echo "Claude.app present"
          else
            command -v obsidian && echo "obsidian binary present"
            command -v zen && echo "zen binary present"
            command -v librewolf && echo "librewolf binary present"
            command -v claude-desktop && echo "claude-desktop binary present"
          fi

      - name: Run install-all.sh (orchestrator smoke test -- everything skips)
        run: ./shell/install-all.sh

  tools-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      # shell: powershell (5.1) is the point -- this script is the rung
      # below pwsh 7 and must run on a clean machine's stock shell.
      - name: Run setup-pwsh.ps1 under Windows PowerShell 5.1
        shell: powershell
        run: .\powershell\setup-pwsh.ps1 -SkipWindowsTerminal

      - name: Run setup-uv.ps1 (foundation -- nvim tooling's ruff install rides uv)
        shell: pwsh
        run: .\powershell\setup-uv.ps1

      - name: Run setup-cli-tools.ps1
        shell: pwsh
        run: .\powershell\setup-cli-tools.ps1

      - name: Run setup-nvim.ps1
        shell: pwsh
        run: .\powershell\setup-nvim.ps1

      - name: Run setup-nvim-tooling.ps1
        shell: pwsh
        run: .\powershell\setup-nvim-tooling.ps1

      - name: Run setup-oh-my-posh.ps1
        shell: pwsh
        run: .\powershell\setup-oh-my-posh.ps1

      - name: Run setup-fonts.ps1
        shell: pwsh
        run: .\powershell\setup-fonts.ps1

      - name: Run setup-neovide.ps1
        shell: pwsh
        run: .\powershell\setup-neovide.ps1

      - name: Run setup-windows-elevated.ps1 (runner shells are admin)
        shell: pwsh
        run: .\powershell\setup-windows-elevated.ps1

      - name: Run setup-ssh-github.ps1
        shell: pwsh
        run: .\powershell\setup-ssh-github.ps1

      - name: Run setup-obsidian.ps1
        shell: pwsh
        run: .\powershell\setup-obsidian.ps1

      - name: Run setup-vscode.ps1
        shell: pwsh
        run: .\powershell\setup-vscode.ps1

      - name: Run setup-zed.ps1
        shell: pwsh
        run: .\powershell\setup-zed.ps1

      - name: Run setup-zen-browser.ps1
        shell: pwsh
        run: .\powershell\setup-zen-browser.ps1

      - name: Run setup-librewolf.ps1
        shell: pwsh
        run: .\powershell\setup-librewolf.ps1

      - name: Run setup-claude-desktop.ps1
        shell: pwsh
        run: .\powershell\setup-claude-desktop.ps1

      - name: Run setup-claude-code.ps1
        shell: pwsh
        run: .\powershell\setup-claude-code.ps1

      - name: Verify everything
        shell: pwsh
        run: |
          $machine = [Environment]::GetEnvironmentVariable('Path', 'Machine')
          $user = [Environment]::GetEnvironmentVariable('Path', 'User')
          $env:Path = @($machine, $user) -join ';'
          $env:Path = "$HOME\.local\bin;$env:Path"
          $failed = @()
          foreach ($cmd in @('jq', 'rg', 'fd', 'fzf', 'bat', 'zoxide', 'nvim', 'oh-my-posh', 'code', 'claude')) {
            if (Get-Command $cmd -ErrorAction SilentlyContinue) {
              "${cmd}: $((& $cmd --version 2>&1 | Select-Object -First 1))"
            } else {
              "${cmd}: MISSING"
              $failed += $cmd
            }
          }
          foreach ($app in @(
            @{ name = 'obsidian'; id = 'Obsidian.Obsidian' },
            @{ name = 'zen'; id = 'Zen-Team.Zen-Browser' },
            @{ name = 'librewolf'; id = 'LibreWolf.LibreWolf' },
            @{ name = 'claude-desktop'; id = 'Anthropic.Claude' }
          )) {
            winget list --id $app.id -e --accept-source-agreements | Out-Null
            if ($LASTEXITCODE -ne 0) { $failed += $app.name } else { "$($app.name): registered with winget" }
          }
          if ($failed.Count -gt 0) { throw "missing: $($failed -join ', ')" }

      - name: Run install-all.ps1 (orchestrator smoke test -- everything skips)
        shell: pwsh
        run: .\powershell\install-all.ps1

  tools-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:stable'
            prereq: 'apt-get update && apt-get install -y git curl ca-certificates tar'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git curl ca-certificates tar'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v7

      - name: Run setup-uv.sh (foundation -- nvim tooling's ruff install rides uv)
        run: ./shell/setup-uv.sh

      - name: Run setup-cli-tools.sh
        run: ./shell/setup-cli-tools.sh

      - name: Run setup-nvim.sh
        run: ./shell/setup-nvim.sh

      - name: Run setup-nvim-tooling.sh
        run: ./shell/setup-nvim-tooling.sh

      - name: Run setup-oh-my-posh.sh
        run: ./shell/setup-oh-my-posh.sh

      - name: Run setup-fonts.sh
        run: ./shell/setup-fonts.sh

      - name: Run setup-neovide.sh
        run: ./shell/setup-neovide.sh

      - name: Run setup-ssh-github.sh
        run: ./shell/setup-ssh-github.sh

      - name: Run setup-obsidian.sh
        run: ./shell/setup-obsidian.sh

      - name: Run setup-vscode.sh
        run: ./shell/setup-vscode.sh

      - name: Run setup-zed.sh
        run: ./shell/setup-zed.sh

      - name: Run setup-zen-browser.sh
        run: ./shell/setup-zen-browser.sh

      - name: Run setup-librewolf.sh
        run: ./shell/setup-librewolf.sh

      - name: Run setup-claude-desktop.sh
        run: ./shell/setup-claude-desktop.sh

      - name: Run setup-claude-code.sh
        run: ./shell/setup-claude-code.sh

      - name: Verify everything
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for cmd in jq rg fd fzf bat zoxide nvim oh-my-posh claude; do
            command -v "$cmd"
            "$cmd" --version 2>&1 | head -n1
          done
          command -v obsidian && echo "obsidian binary present"
          command -v code && echo "code binary present"
          command -v zen && echo "zen binary present"
          # librewolf: extrepo path on debian only; claude-desktop:
          # debian-family only -- both self-skip on arch, so only assert
          # them where they're expected.
          if command -v apt-get >/dev/null 2>&1; then
            command -v librewolf && echo "librewolf binary present"
            command -v claude-desktop && echo "claude-desktop binary present"
          fi

      - name: Run install-all.sh (orchestrator smoke test -- everything skips)
        run: ./shell/install-all.sh

  gh-cli-unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Run setup-gh-cli.sh
        run: ./shell/setup-gh-cli.sh

      - name: Verify gh
        run: gh --version

  gh-cli-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run setup-gh-cli.ps1
        shell: pwsh
        run: .\powershell\setup-gh-cli.ps1

      - name: Verify gh
        shell: pwsh
        run: gh --version

  # setup-gh-cli.sh's apt path adds GitHub's own apt repo with a
  # GPG-verified keyring (gh isn't in Debian/Ubuntu's default repos) --
  # proven on a fresh container rather than trusted from GitHub's docs.
  # archlinux covers the pacman path.
  gh-cli-distros:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: 'debian:stable'
            prereq: 'apt-get update && apt-get install -y git ca-certificates'
          - image: 'archlinux:latest'
            prereq: 'pacman -Syu --noconfirm --needed git ca-certificates'
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install checkout prerequisites
        run: ${{ matrix.prereq }}

      - uses: actions/checkout@v7

      - name: Run setup-gh-cli.sh
        run: ./shell/setup-gh-cli.sh

      - name: Verify gh
        run: gh --version

  # Public-repo trap: scheduled workflows are auto-disabled after 60 days
  # without repository activity, and scheduled runs themselves don't count
  # as activity -- so the weekly drift check would silently die two months
  # into any quiet stretch, which is exactly when it matters most.
  # Re-enabling an already-enabled workflow resets that clock; each cron
  # run therefore keeps itself alive. (Community-established behavior of
  # the enable endpoint, not documented -- if GitHub ever changes it, the
  # symptom just reverts to "cron went quiet".) Dispatch runs it too so
  # the step stays testable by hand; push/PR runs skip it.
  keepalive:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Reset the 60-day scheduled-workflow timer
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow enable test.yml --repo "$GITHUB_REPOSITORY"
